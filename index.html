  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    :root {
      --footer-height: 70px;
    }

    /* --- ORIGINAL NAVBAR (restored) --- */
    .new-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.02);
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-blue {
      color: #007BFF;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }
    .logo-orange {
      color: #FF6F00;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }

    /* main container - FIXED: Centered on mobile */
    .main-container {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-top: 100px;
      padding-bottom: calc(var(--footer-height) + 30px);
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Center vertically */
      align-items: center; /* Center horizontally */
    }

    /* Ensure the glass card takes full width but stays centered */
    .glass-card {
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.01);
    }

    /* loader bars */
    .bars { display:flex; gap:8px; justify-content:center; margin-top:14px; }
    .bar { width:7px; height:14px; background: linear-gradient(180deg, #0077FF, #FF6A00); border-radius: 8px; animation:pulse 1.2s infinite; }
    .bar:nth-child(2){ animation-delay: 0.2s; }
    .bar:nth-child(3){ animation-delay: 0.4s; }
    .bar:nth-child(4){ animation-delay: 0.6s; }
    @keyframes pulse { 0%,100%{height:14px;} 50%{height:50px;} }

    /* footer – "Design by Pro Toolss" with underline */
    footer {
      background: #0b1426;
      color: white;
      height: var(--footer-height);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      flex-shrink: 0;
      font-size: 1rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .design-footer {
      color: #94a3b8;
    }
    .design-footer .highlight {
      color: #facc15;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 2.5px;
      text-decoration-color: #facc15;
      transition: color 0.2s, text-decoration-color 0.2s;
    }
    .design-footer .highlight:hover {
      color: #fde047;
      text-decoration-color: #fde047;
    }

    @media (max-width: 768px) {
      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 35;
      }
    }

    select, input {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid #e9edf2;
      transition: 0.2s ease;
      font-weight: 500;
    }
    select:focus, input:focus {
      border-color: #0077FF;
      box-shadow: 0 0 0 3px rgba(0,119,255,0.15);
      outline: none;
    }
    .gradient-btn {
      background: linear-gradient(145deg, #0077FF, #FF6A00);
      background-size: 200% auto;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,119,255,0.25);
      border: none;
      letter-spacing: 0.3px;
    }
    .gradient-btn:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 36px rgba(0,119,255,0.35);
      background-position: right center;
    }
    .gradient-btn:active {
      transform: scale(0.97);
    }

    /* Home Button - 3 lines + "Home" text */
    .home-btn {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 30px;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .home-btn:hover {
      background: rgba(0,0,0,0.04);
      transform: scale(1.02);
    }
    .home-btn .lines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .home-btn .lines span {
      display: block;
      width: 24px;
      height: 3px;
      background: #1e293b;
      border-radius: 4px;
      transition: all 0.25s ease;
    }
    .home-btn:hover .lines span {
      background: #0077FF;
    }
    .home-btn .label {
      font-size: 0.6rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
      transition: color 0.2s;
    }
    .home-btn:hover .label {
      color: #0077FF;
    }
  </style>
</head>
<body>

  <!-- ORIGINAL NAVBAR: Pro Developing + Home Button (3 lines + "Home") -->
  <nav class="new-nav">
    <div class="flex items-center gap-0.5">
      <span class="logo-blue">Pro</span>
      <span class="logo-orange"> Developing</span>
    </div>
    <!-- Home Button with 3 lines + "Home" text -->
    <button id="homeBtn" class="home-btn" aria-label="Home">
      <div class="lines">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <span class="label">Home</span>
    </button>
  </nav>

  <!-- MAIN CONTENT - FIXED: Centered on mobile -->
  <main class="main-container">
    <div class="glass-card p-7 rounded-3xl shadow-2xl">
      <div class="text-center mb-5">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#0077FF] to-[#FF6A00] bg-clip-text text-transparent">
          Age Calculator
        </h1>
        <p class="text-sm text-gray-500 mt-1 font-medium">DD / Month / YYYY</p>
      </div>

      <!-- Date inputs -->
      <div class="grid grid-cols-3 gap-3 mb-5">
        <select id="day" class="p-3 rounded-xl border text-gray-700 text-sm font-medium">
          <option value="">DD</option>
        </select>
        <select id="month" class="p-3 rounded-xl border text-gray-700 text-sm font-medium">
          <option value="">Month</option>
        </select>
        <input type="number" id="year" placeholder="YYYY" 
               class="p-3 rounded-xl border text-center text-gray-700 text-sm font-medium" />
      </div>

      <!-- GRADIENT BUTTON -->
      <button onclick="calculateAge()" 
              class="gradient-btn w-full py-3.5 rounded-2xl text-white font-bold text-lg shadow-xl transition-all duration-300">
        <i class="fa-regular fa-calendar-check mr-2"></i> Calculate Age
      </button>

      <!-- Loader -->
      <div id="loader" class="bars hidden">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>

      <!-- Result box -->
      <div id="resultBox" class="hidden mt-5 p-5 rounded-2xl bg-gradient-to-br from-slate-50 to-gray-100 border border-gray-200/70 shadow-inner">
        <h3 class="text-md font-semibold text-gray-600 uppercase tracking-wide flex items-center gap-2">
          <i class="fa-regular fa-clock text-[#0077FF]"></i> Your Age
        </h3>
        <p id="resultText" class="text-2xl font-extrabold mt-1 tracking-tight"></p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="design-footer">
      Design by 
      <!-- ========== SECURITY ADDED: rel="noopener noreferrer" ========== -->
      <a href="https://www.protoolss.online" target="_blank" rel="noopener noreferrer" class="highlight">
        Pro Toolss
      </a>
    </div>
  </footer>

<script>
  // Fill day & month dropdowns
  (function fillDate() {
    const day = document.getElementById('day');
    const month = document.getElementById('month');
    for (let i=1; i<=31; i++) {
      const val = i.toString().padStart(2,'0');
      day.innerHTML += `<option value="${i}">${val}</option>`;
    }
    const monthsList = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    monthsList.forEach((m, idx) => {
      month.innerHTML += `<option value="${idx+1}">${m}</option>`;
    });
  })();

  // Home Button - navigates to protoolss.online
  document.getElementById('homeBtn').addEventListener('click', function() {
    window.location.href = 'https://www.protoolss.online';
  });

  // ========== FIXED: Helper function to check invalid dates (31 Feb, 31 Apr, etc.) ==========
  function isValidDate(day, month, year) {
    // month is 1-indexed (1 = January)
    const daysInMonth = new Date(year, month, 0).getDate(); // month is 1-indexed, so passing month gives last day of previous month
    return day <= daysInMonth;
  }

  // ========== FIXED: Enter key support - trigger calculation on Enter in year field ==========
  document.getElementById('year').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault(); // Prevent form submission if any
      calculateAge();
    }
  });

  // ---------- AGE CALCULATOR (FIXED) ----------
  function calculateAge() {
    const dayEl = document.getElementById('day');
    const monthEl = document.getElementById('month');
    const yearEl = document.getElementById('year');

    const d = parseInt(dayEl.value, 10);
    const m = parseInt(monthEl.value, 10);
    const y = yearEl.value.trim();

    // ========== FIXED: Better validation messages ==========
    if (!d || !m || !y) {
      alert('Please enter complete date (DD, Month, YYYY)');
      return;
    }

    const yearNum = Number(y);
    const currentYear = new Date().getFullYear();

    // ========== FIXED: Year range validation ==========
    if (yearNum < 1900 || yearNum > currentYear) {
      alert(`Please enter a valid year between 1900 and ${currentYear}`);
      return;
    }

    // ========== FIXED: Invalid date validation (31 Feb, 31 Apr, etc.) ==========
    if (!isValidDate(d, m, yearNum)) {
      alert(`Invalid date: ${d}/${m}/${yearNum}. Please check the day and month combination.`);
      return;
    }

    // ========== FIXED: Future date validation ==========
    const today = new Date();
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const birthDate = new Date(yearNum, m - 1, d); // month is 0-indexed in JS

    // Ensure the birth date is valid and not in the future
    if (birthDate > todayDate) {
      alert('Future dates are not allowed. Please enter a past date.');
      return;
    }

    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');
    const resultText = document.getElementById('resultText');
    resultBox.classList.add('hidden');
    loader.classList.remove('hidden');

    setTimeout(() => {
      loader.classList.add('hidden');

      // ========== FIXED: Accurate age calculation ==========
      let years = today.getFullYear() - birthDate.getFullYear();
      let months = today.getMonth() - birthDate.getMonth();
      let days = today.getDate() - birthDate.getDate();

      // Adjust for negative days
      if (days < 0) {
        months--;
        // Get the last day of the previous month
        const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonthDate.getDate();
      }

      // Adjust for negative months
      if (months < 0) {
        years--;
        months += 12;
      }

      // Edge case: if days is still negative (should not happen, but safety)
      if (days < 0) {
        months--;
        const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonthDate.getDate();
        if (months < 0) {
          years--;
          months += 12;
        }
      }

      // Final safety check: if years is negative, set to 0
      if (years < 0) {
        years = 0;
        months = 0;
        days = 0;
      }

      resultText.innerHTML = `
        <span style="color:#0077FF; font-size:2.1rem; font-weight:800;">${years}</span> 
        <span style="font-weight:600; color:#1e293b;">years</span> 
        <span style="color:#FF6A00; font-size:1.8rem; font-weight:700;">${months}</span> 
        <span style="font-weight:600; color:#1e293b;">months</span> 
        <span style="color:#0f172a; font-size:1.6rem; font-weight:700;">${days}</span> 
        <span style="font-weight:500; color:#475569;">days</span>
      `;
      resultBox.classList.remove('hidden');
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 700);
  }
</script>

</body>
</html>
