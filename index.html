    /* ===== FOOTER (new) ===== */
    footer {

    /* ===== MAIN CONTAINER (age calculator) ===== */
    .main-container {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-top: 20px;
      padding-bottom: 40px;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

    .glass-card {
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.01);
    }
    .bars { display:flex; gap:8px; justify-content:center; margin-top:14px; }
    .bar { width:7px; height:14px; background: linear-gradient(180deg, #0077FF, #FF6A00); border-radius: 8px; animation:pulse 1.2s infinite; }
    .bar:nth-child(2){ animation-delay: 0.2s; }
    .bar:nth-child(3){ animation-delay: 0.4s; }
    .bar:nth-child(4){ animation-delay: 0.6s; }
    @keyframes pulse { 0%,100%{height:14px;} 50%{height:50px;} }
    select, input {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid #e9edf2;
      transition: 0.2s ease;
      font-weight: 500;
    }
    select:focus, input:focus {
      border-color: #0077FF;
      box-shadow: 0 0 0 3px rgba(0,119,255,0.15);
      outline: none;
    }
    .gradient-btn {
      background: linear-gradient(145deg, #0077FF, #FF6A00);
      background-size: 200% auto;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,119,255,0.25);
      border: none;
      letter-spacing: 0.3px;
    }
    .gradient-btn:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 36px rgba(0,119,255,0.35);
      background-position: right center;
    }
    .gradient-btn:active { transform: scale(0.97); }

      .logo { font-size: 1rem; gap: 4px; }
      .logo-icon { width: 24px; height: 24px; }
      .nav-links-mobile { padding: 12px 16px 10px; gap: 0.4rem; }
      .nav-links-mobile a { font-size: 0.85rem; padding: 6px 0; }
      .nav-links-mobile a i { width: 20px; font-size: 0.8rem; }

    }
    @media (min-width: 769px) {
      .nav-left { flex: 1; justify-content: space-between; }
      .hamburger { display: block !important; font-size: 1.8rem; padding: 8px 12px; }
      .nav-links-mobile { max-width: 300px; right: 0; left: auto; border-radius: 0 0 16px 16px; }
    }
  </style>
</head>
<body>

  <!-- ===== NEW NAVBAR ===== -->
  <nav id="mainNav">
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <img src="https://i.ibb.co/FkJPMZ8r/Chat-GPT-Image-Jun-18-2026-07-58-22-AM.png" alt="Pro Toolss Logo" class="logo-icon" />
          <span class="pro">Pro</span><span class="toolss">Toolss</span>
        </a>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <div class="nav-center" style="display:none !important;"></div>
      <div class="nav-links-mobile" id="navLinksMobile">
        <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT (Age Calculator) ===== -->
  <main class="main-container">
    <div class="glass-card p-7 rounded-3xl shadow-2xl">
      <div class="text-center mb-5">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#0077FF] to-[#FF6A00] bg-clip-text text-transparent">
          Age Calculator
        </h1>
        <p class="text-sm text-gray-500 mt-1 font-medium">DD / Month / YYYY</p>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-5">
        <select id="day" class="p-3 rounded-xl border text-gray-700 text-sm font-medium">
          <option value="">DD</option>
        </select>
        <select id="month" class="p-3 rounded-xl border text-gray-700 text-sm font-medium">
          <option value="">Month</option>
        </select>
        <input type="number" id="year" placeholder="YYYY" 
               class="p-3 rounded-xl border text-center text-gray-700 text-sm font-medium" />
      </div>

      <button onclick="calculateAge()" 
              class="gradient-btn w-full py-3.5 rounded-2xl text-white font-bold text-lg shadow-xl transition-all duration-300">
        <i class="fa-regular fa-calendar-check mr-2"></i> Calculate Age
      </button>

      <div id="loader" class="bars hidden">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>

      <div id="resultBox" class="hidden mt-5 p-5 rounded-2xl bg-gradient-to-br from-slate-50 to-gray-100 border border-gray-200/70 shadow-inner">
        <h3 class="text-md font-semibold text-gray-600 uppercase tracking-wide flex items-center gap-2">
          <i class="fa-regular fa-clock text-[#0077FF]"></i> Your Age
        </h3>
        <p id="resultText" class="text-2xl font-extrabold mt-1 tracking-tight"></p>
      </div>
    </div>
  </main>

  <!-- ===== NEW FOOTER ===== -->
  <footer>
    <div class="footer-content">
      <div class="footer-powered">
        <i class=""></i> Powered by
        <a href="https://www.protoolss.online" target="_blank" rel="noopener noreferrer">www.protoolss.online</a>
        <i class="" style="color: #ff6b6b;"></i>
      </div>
    </div>
  </footer>

  <!-- Font Awesome 6 (already included) -->
  <!-- ===== SCRIPTS ===== -->
  <script>
    (function() {
      // Navbar scroll effect
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
      });

      // Hamburger toggle
      const hamburger = document.getElementById('hamburgerBtn');
      const navLinksMobile = document.getElementById('navLinksMobile');

      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navLinksMobile.classList.toggle('show');
        const icon = this.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
      });

      document.querySelectorAll('#navLinksMobile a').forEach(link => {
        link.addEventListener('click', function() {
          navLinksMobile.classList.remove('show');
          const icon = hamburger.querySelector('i');
          icon.classList.add('fa-bars');
          icon.classList.remove('fa-times');
        });
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('nav') && navLinksMobile.classList.contains('show')) {
          navLinksMobile.classList.remove('show');
          const icon = hamburger.querySelector('i');
          icon.classList.add('fa-bars');
          icon.classList.remove('fa-times');
        }
      });
    })();

    // ===== AGE CALCULATOR LOGIC (unchanged) =====
    (function fillDate() {
      const day = document.getElementById('day');
      const month = document.getElementById('month');
      for (let i=1; i<=31; i++) {
        const val = i.toString().padStart(2,'0');
        day.innerHTML += `<option value="${i}">${val}</option>`;
      }
      const monthsList = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      monthsList.forEach((m, idx) => {
        month.innerHTML += `<option value="${idx+1}">${m}</option>`;
      });
    })();

    function isValidDate(day, month, year) {
      const daysInMonth = new Date(year, month, 0).getDate();
      return day <= daysInMonth;
    }

    document.getElementById('year').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        calculateAge();
      }
    });

    function calculateAge() {
      const dayEl = document.getElementById('day');
      const monthEl = document.getElementById('month');
      const yearEl = document.getElementById('year');

      const d = parseInt(dayEl.value, 10);
      const m = parseInt(monthEl.value, 10);
      const y = yearEl.value.trim();

      if (!d || !m || !y) {
        alert('Please enter complete date (DD, Month, YYYY)');
        return;
      }

      const yearNum = Number(y);
      const currentYear = new Date().getFullYear();

      if (yearNum < 1900 || yearNum > currentYear) {
        alert(`Please enter a valid year between 1900 and ${currentYear}`);
        return;
      }

      if (!isValidDate(d, m, yearNum)) {
        alert(`Invalid date: ${d}/${m}/${yearNum}. Please check the day and month combination.`);
        return;
      }

      const today = new Date();
      const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const birthDate = new Date(yearNum, m - 1, d);

      if (birthDate > todayDate) {
        alert('Future dates are not allowed. Please enter a past date.');
        return;
      }

      const loader = document.getElementById('loader');
      const resultBox = document.getElementById('resultBox');
      const resultText = document.getElementById('resultText');
      resultBox.classList.add('hidden');
      loader.classList.remove('hidden');

      setTimeout(() => {
        loader.classList.add('hidden');

        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        if (days < 0) {
          months--;
          const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
          days += prevMonthDate.getDate();
        }

        if (months < 0) {
          years--;
          months += 12;
        }

        if (days < 0) {
          months--;
          const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
          days += prevMonthDate.getDate();
          if (months < 0) {
            years--;
            months += 12;
          }
        }

        if (years < 0) {
          years = 0;
          months = 0;
          days = 0;
        }

        resultText.innerHTML = `
          <span style="color:#0077FF; font-size:2.1rem; font-weight:800;">${years}</span> 
          <span style="font-weight:600; color:#1e293b;">years</span> 
          <span style="color:#FF6A00; font-size:1.8rem; font-weight:700;">${months}</span> 
          <span style="font-weight:600; color:#1e293b;">months</span> 
          <span style="color:#0f172a; font-size:1.6rem; font-weight:700;">${days}</span> 
          <span style="font-weight:500; color:#475569;">days</span>
        `;
        resultBox.classList.remove('hidden');
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 700);
    }
  </script>
